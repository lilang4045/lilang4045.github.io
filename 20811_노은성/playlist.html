<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- 웹 문서의 인코딩 방식을 UTF-8로 지정하여 한글 깨짐을 방지합니다. -->
    <meta charset="UTF-8">
    <!-- 브라우저 탭에 표시될 웹 페이지의 제목(플레이리스트)입니다. -->
    <title>Playlist</title>
    
    <style>
        /* 웹 페이지 전체의 배경색을 연한 회색(#f5f5f5)으로 설정합니다. */
        body {
            background: #f5f5f5;
        }
        
        /* 상단 메뉴바의 배경색을 파란색 계열(rgb)로 설정합니다. */
        #menubar { 
            background : rgb(52, 140, 175); 
        }
        
        /* 메뉴바 내부의 ul(목록) 태그 마진과 패딩을 초기화합니다. */
        #menubar ul { 
            margin : 0; 
            padding : 0; 
            width : 567px; /* 이전 페이지와 마찬가지로 따옴표를 지워 올바른 규격으로 수정했습니다. */
        }
        
        /* 상단 메뉴 항목(li)들을 가로로 나열하고 좌우 여백을 설정합니다. */
        #menubar ul li {
            display: inline-block;    /* 리스트 항목들을 가로 방향으로 정렬합니다. */
            list-style-type: none;    /* 리스트 앞의 기본 점(불릿)을 없앱니다. */
            padding: 0px 15px;        /* 위아래 여백 없이 좌우 안쪽 여백만 15px씩 부여합니다. */
        }
        
        /* 메뉴판 내부의 링크(a) 스타일: 흰 글씨에 밑줄 제거 */
        #menubar ul li a { 
            color : white; 
            text-decoration: none; 
        }
        
        /* 메뉴 링크에 마우스를 올렸을 때 글씨를 보라색(violet)으로 바꿉니다. */
        #menubar ul li a:hover { 
            color : violet; 
        }
        
        /* 플레이리스트의 각 노래 항목(li) 스타일 설정 */
        #playlist li { 
            font-size: 35px;          /* 글자 크기를 크게(35px) 설정합니다. */
            display: flex;            /* Flexbox 레이아웃을 사용해 내부 요소(이미지와 텍스트)를 정렬합니다. */
            align-items: center;      /* 앨범 이미지와 노래 제목 텍스트가 세로 중앙에 오도록 맞춥니다. */
            gap: 15px;                /* 이미지와 텍스트 사이의 간격을 15px로 띄웁니다. */
            margin-bottom: 15px;      /* 목록(노래)과 목록 사이의 아래쪽 여백을 15px 줍니다. */
        }
        
        /* 플레이리스트 목록(ul) 앞의 불릿 기호를 제거합니다. */
        #playlist ul { 
            list-style: none;
        }
        
        /* 본문의 기본 하이퍼링크(a) 스타일: 밑줄을 없애고 검은색 글씨로 지정합니다. */
        a {
            text-decoration-line: none;
            color : black;
        }
    </style>
</head>
<body>
    <!-- 페이지 최상단 대제목입니다. -->
    <h1>Playlist</h1>
    
    <!-- 네비게이션 메뉴바 영역입니다. -->
    <nav id="menubar">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="profile.html">Profile</a></li>
            <li><a href="playlist.html">Playlist 🎶</a></li>
            <li><a href="links.html">Links</a></li>
        </ul>
    </nav>
    
    <!-- 플레이리스트 영역입니다. -->
    <nav id="playlist">
        <ul>

            <li>
                <img src="images/song1.png" alt="너 앨범커버" width="150px">

            </li>

                <img src="images/song3.png" alt="Burning slow-Remix 앨범커버" width="150px">

            <li>
                <img src="images/song4.png" alt="아름다워 앨범커버" width="150px">
                <a href="https://open.spotify.com/track/4aoFxjNJ1qQ9HZwq6CGPxy">아름다워 - CHANGMO</a>

            <li>

    <!-- 하단 푸터(저작권 표시) 영역입니다. -->

</html>
