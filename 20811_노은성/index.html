<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- 문서의 문자 인코딩을 UTF-8로 설정하여 한글 깨짐을 방지합니다. -->
    <meta charset="UTF-8">
    <!-- 브라우저 탭에 표시될 웹 페이지의 제목입니다. -->
    <title>노은성 페이지</title>
    
    <style>
        /* 웹 페이지 전체 배경색을 연한 회색(#f5f5f5)으로 설정합니다. */
        body {
            background: #f5f5f5;
        }
        
        /* 메뉴바의 배경색을 파란색 계열(rgb)로 설정합니다. */
        #menubar { 
            background : rgb(52, 140, 175); 
        }
        
        /* 메뉴바 내부의 ul(목록) 태그 스타일 설정 */
        #menubar ul { 
            margin : 0; 
            padding : 0; 
            width : 567px; /* 주의: 원래 코드의 "567"px 따옴표를 제거하여 올바른 CSS 문법으로 수정했습니다. */
        }
        
        /* 메뉴 항목(li)들을 가로로 나열하고 여백을 줍니다. */
        #menubar ul li {
            display: inline-block;    /* 세로로 나열되는 리스트를 가로로 배치합니다. */
            list-style-type: none;    /* 리스트 앞의 점(불릿)을 제거합니다. */
            padding: 0px 15px;        /* 위아래 0px, 좌우 15px의 안쪽 여백을 줍니다. */
        }
        
        /* 메뉴 링크(a)의 글자 색상을 흰색으로 하고, 밑줄을 제거합니다. */
        #menubar ul li a { 
            color : white; 
            text-decoration: none; 
        }
        
        /* 메뉴 링크에 마우스를 올렸을 때(hover) 글자 색상을 보라색(violet)으로 변경합니다. */
        #menubar ul li a:hover { 
            color : violet; 
        }
    </style>
</head>
<body>
    <!-- 웹 페이지의 가장 큰 주제인 이름(제목)을 표시합니다. -->
    <h1>노은성</h1>

    <!-- 네비게이션 메뉴 영역입니다. -->
    <nav id="menubar">
        <ul>
            <!-- 각 페이지로 이동할 수 있는 하이퍼링크 목록입니다. -->
            <li><a href="index.html">Home</a></li>
            <li><a href="profile.html">Profile</a></li>
            <li><a href="playlist.html">Playlist 🎶</a></li>
            <li><a href="links.html">Links</a></li>
        </ul>
    </nav>
    
    <!-- 가로 구분선을 그어 영역을 분리합니다. -->
    <hr>

    <!-- 본문 섹션의 소제목입니다. -->
    <h2>환영합니다</h2>
    
    <!-- 본문 내용 문단입니다. -->
    <p>
        이 사이트는 노은성 소개 페이지입니다.<br> <!-- <br> 태그로 줄바꿈을 합니다. -->
        위 메뉴를 클릭하면 각 페이지로 이동합니다.
    </p>
    <hr>

    <!-- 저작권 표시 등을 위한 하단 영역입니다. <small> 태그로 글씨를 작게 표시합니다. -->
    <p><small>(C) 2026 Noh Eunseong. All rights reserved.</small></p>
</body>
</html>
