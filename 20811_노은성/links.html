<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- 웹 문서의 인코딩 방식을 UTF-8로 지정하여 한글 깨짐을 방지합니다. -->
    <meta charset="UTF-8">
    <!-- 브라우저 탭에 표시될 웹 페이지의 제목입니다. (현재 본문 제목은 Links로 되어 있습니다!) -->
    <title>Hobby</title>
    
    <style>
        /* 웹 페이지 전체의 배경색을 연한 회색(#f5f5f5)으로 설정합니다. */
        body {
            background: #f5f5f5;
        }
        
        /* 상단 메뉴바의 배경색을 파란색 계열(rgb)로 설정합니다. */
        #menubar { 
            background : rgb(52, 140, 175); 
        }
        
        /* 메뉴바 내부의 ul(목록) 태그 마진과 패딩을 초기화하고 너비를 500px로 잡습니다. */
        #menubar ul { 
            margin : 0; 
            padding : 0; 
            width : 500px; 
        }
        
        /* 상단 메뉴 항목(li)들을 가로로 나열하고 좌우 여백을 설정합니다. */
        #menubar ul li {
            display: inline-block;    /* 리스트 항목들을 가로 방향으로 정렬합니다. */
            list-style-type: none;    /* 리스트 앞의 기본 점(불릿)을 없앱니다. */
            padding: 0px 15px;        /* 위아래 여백 없이 좌우 안쪽 여백만 15px씩 부여합니다. */
        }   
        
        /* 메뉴판 내부의 링크(a) 스타일: 흰 글씨에 밑줄 제거 */
        #menubar ul li a { 
            color : white; 
            text-decoration: none; 
        }
        
        /* 메뉴 링크에 마우스를 올렸을 때 글씨를 보라색(violet)으로 바꿉니다. */
        #menubar ul li a:hover { 
            color : violet; 
        }
        
        /* SNS 목록 표(table) 스타일 설정 */
        table {
            border: 1px #a39485 solid;          /* 표 바깥쪽에 연한 갈색 테두리를 칩니다. */
            font-size: .9em;                    /* 글자 크기를 기본 크기보다 약간 작게(90%) 설정합니다. */
            box-shadow: 0 2px 5px rgba(0,0,0,.25); /* 표 뒤쪽에 은은한 그림자 효과를 줍니다. */
            width: 100%;                        /* 표가 기본적으로 부모 너비를 가득 채우도록 합니다. */
            max-width: 250px;                   /* 하지만 최대 너비는 250px까지만 늘어나도록 제한합니다. */
            margin: 20px 0;                     /* 표 위아래로 20px의 바깥 여백을 주어 본문과 띄웁니다. */
            border-collapse: collapse;          /* 이중선 테두리를 방지하고 단일 테두리로 합쳐 깔끔하게 만듭니다. */
            border-radius: 5px;                 /* 표 테두리 모서리를 5px 만큼 둥글게 깎습니다. */
            overflow: hidden;                   /* 모서리를 깎았을 때 내부 요소가 삐져나오지 않도록 숨깁니다. */
        }
        
        /* 표의 제목 셀(th)과 일반 데이터 셀(td)의 공통 스타일 설정 */
        th, td {
            padding: 10px;                      /* 셀 내부 공간에 사방으로 10px의 안쪽 여백을 줍니다. */
            text-align: center;                 /* 셀 안의 텍스트와 이미지를 가로 기준 가운데 정렬합니다. */
            vertical-align: middle;             /* 셀 안의 요소를 세로 기준 가운데 정렬합니다. */
        }
    </style>
</head>
<body>
